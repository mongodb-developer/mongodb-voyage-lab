services:
  lab-runner:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mongodb:
        condition: service_healthy
    command: sleep infinity
    networks:
      - lab
    environment:
      - MONGODB_URI=mongodb://admin:mongodb@mongodb:27017/?directConnection=true
      - NODE_PATH=/workspaces/mongodb-voyage-lab/node_modules

  mongodb:
    image: mongodb/mongodb-atlas-local:8.2.0
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    env_file:
      - path: .env
        required: false
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=admin
      - MONGODB_INITDB_ROOT_PASSWORD=mongodb
      # Injected via .env written by setup.sh (postCreateCommand) where
      # Codespace secrets are available. See .devcontainer/setup.sh.
      - INDEXING_VOYAGE_AI_API_KEY=${VOYAGE_API_KEY:-}
      - QUERY_VOYAGE_AI_API_KEY=${VOYAGE_API_KEY:-}
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lab

networks:
  lab:
    driver: bridge

volumes:
  mongodb_data:
